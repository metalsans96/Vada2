name: Python CI
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest
 # Eтап 2: Розгортання (CD)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup SSH
        run: |
          echo "Simulating SSH keys generation..."
          echo "Keys configured for host: ${{ secrets.HOST}}"

      - name: Deploy via SSH
        run:  |
          echo "Connecting to ${{ secrets.HOST}}..."
          echo "Pulling latest changes and rebuilding Docker containers..."
          echo "Deploy successful!"